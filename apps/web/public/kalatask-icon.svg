<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>KalaTask</title>
  <defs>
    <linearGradient id="kt-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0060A0"/>
      <stop offset="100%" stop-color="#00A0E0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#kt-grad)"/>
  <!-- KT monogram: stylized K + T -->
  <g fill="#FFFFFF">
    <!-- K stem -->
    <rect x="120" y="120" width="44" height="272" rx="6"/>
    <!-- K diagonals -->
    <path d="M164 256 L260 144 L296 168 L210 256 L296 344 L260 368 Z"/>
    <!-- T crossbar -->
    <rect x="312" y="120" width="80" height="40" rx="6"/>
    <!-- T stem -->
    <rect x="332" y="160" width="40" height="232" rx="6"/>
  </g>
</svg>
